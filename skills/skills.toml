# Remote-skill manifest — GENERIC scope (git-tracked, synced to every instance).
#
# Each [[skills]] entry declares a skill fetched from a git source into the gitignored
# .skill-cache/ by scripts/resolve-skills.sh; the content is REFERENCED, never
# committed. You maintain this list — one entry per skill. `install-skill --remote`
# appends an entry here (--save); bumping `ref` + `resolve-skills.sh --update` updates.
#
# Fields:
#   name  (required) — the skill's directory name in the cache
#   url   (required) — git remote (https/ssh/file)
#   ref   (required) — branch, tag, or sha to pin (reproducibility)
#   path  (optional) — subdir within the repo that holds SKILL.md
#
# Per-instance remotes go in skills-local/skills.toml (gitignored).
#
# Example:
#   [[skills]]
#   name = "renovate-pro"
#   url  = "https://github.com/org/skills.git"
#   ref  = "v1.2.0"
#   path = "skills/renovate"

[[skills]]
name = "renovate-manager"
url  = "git@github.com:seyio91/agent-skills.git"
ref  = "main"
path = "renovate-manager"

